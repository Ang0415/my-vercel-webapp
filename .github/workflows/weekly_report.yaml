name: Weekly Portfolio Report

on:
  schedule:
    # 매주 월요일 오전 9시 (KST) = UTC 0시
    - cron: '0 0 * * 1'
  workflow_dispatch: # 수동 실행 가능

jobs:
  report:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y fonts-nanum
        python -m pip install --upgrade pip
        pip install streamlit pandas gspread oauth2client plotly yfinance playwright matplotlib
        playwright install chromium

    - name: Create Google API Key File
      env:
        GCP_JSON_KEY_CONTENT: ${{ secrets.GCP_JSON_KEY }}
      run: |
        # Python을 사용하여 JSON 내용을 파일로 안전하게 저장 (인코딩/줄바꿈 문제 방지)
        python -c "import os; content = os.environ.get('GCP_JSON_KEY_CONTENT', ''); print(f'DEBUG: Secret Length = {len(content)}'); open('stock-auto-writer-44eaa06c140c.json', 'w', encoding='utf-8').write(content)"

    - name: Run Weekly Report
      env:
        EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
      run: |
        python weekly_report.py

    - name: Send Telegram Notification
      if: success()
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: ✅ 주간 리포트 생성 및 발송 완료!
