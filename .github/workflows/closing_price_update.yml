name: Update Closing Prices

on:
  schedule:
    # 09:00 PM KST = 12:00 UTC
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install yfinance gspread oauth2client pandas python-telegram-bot

    - name: Create JSON key file
      env:
        GCP_JSON_KEY_CONTENT: ${{ secrets.GCP_JSON_KEY }}
      run: |
        python -c "import os; open('stock-auto-writer-44eaa06c140c.json', 'w', encoding='utf-8').write(os.environ['GCP_JSON_KEY_CONTENT'])"

    - name: Run Closing Price Updater
      run: python update_closing_prices.py
      env:
        PYTHONIOENCODING: utf-8



    - name: Run Portfolio Performance Script
      run: python portfolio_performance.py
      env:
        PYTHONIOENCODING: utf-8

    - name: Send Telegram Notification
      if: success()
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: ✅ 종가 업데이트가 성공적으로 완료되었습니다!
